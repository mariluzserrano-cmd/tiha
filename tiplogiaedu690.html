<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipología de las Realidades Inmersivas</title>
    <style>
        /* Paleta de colores basada en la infografía */
        :root {
            --azul-oscuro: #0D3A84;
            --azul-medio: #2B65B5;
            --azul-claro: #E6F0FA;
            --celeste: #4eb5e6;
            --blanco: #ffffff;
            --texto: #333333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--azul-claro);
            color: var(--texto);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            background: var(--blanco);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 1000px;
            width: 100%;
        }

        .header h1 {
            color: var(--azul-oscuro);
            margin: 0 0 10px 0;
            font-size: 2.5em;
        }

        .header p {
            color: var(--azul-medio);
            font-size: 1.2em;
            margin: 0;
            font-style: italic;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        /* Estilo de las tarjetas interactivas */
        .card {
            background-color: var(--blanco);
            border-top: 5px solid var(--azul-medio);
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(13, 58, 132, 0.2);
            border-top: 5px solid var(--celeste);
        }

        .card h3 {
            color: var(--azul-oscuro);
            margin-top: 0;
            font-size: 1.3em;
        }

        .card p {
            font-size: 0.95em;
            color: #555;
        }

        .click-hint {
            display: inline-block;
            margin-top: 15px;
            padding: 5px 15px;
            background-color: var(--azul-claro);
            color: var(--azul-oscuro);
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        /* Estilos del Modal (Ventana emergente) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(13, 58, 132, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-content {
            background-color: var(--blanco);
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            box-shadow: 0
