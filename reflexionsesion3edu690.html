<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDU 690 · Reflexión · Sesión 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F6FB; --bg-soft: #EAEEF8; --card: #FFFFFF;
  --ink: #1E2A44; --ink-soft: #4A5878; --ink-faint: #8290AE;
  --blue: #4A7DD6; --blue-deep: #2E5AA8; --lavender: #B8A6E8; --lavender-deep: #8B6FD4;
  --gold: #C98A3C; --teal: #5FB3A3; --line: rgba(74,125,214,0.16);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--ink);
  font-family: 'IBM Plex Sans', sans-serif; font-size: 16px; line-height: 1.6;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}
body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 55% 40% at 15% 8%, rgba(74,125,214,0.1), transparent 60%),
              radial-gradient(ellipse 50% 35% at 88% 92%, rgba(184,166,232,0.14), transparent 60%);
}
.app { position: relative; z-index: 2; max-width: 760px; margin: 0 auto; padding: 0 24px; min-height: 100vh; display: flex; flex-direction: column; }
.app-header { padding: 28px 0; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--line); }
.brand-mark {
  width: 42px; height: 42px; border: 1px solid var(--blue); border-radius: 50%;
  display: grid; place-items: center; font-family: 'Fraunces', serif; font-style: italic;
  font-weight: 900; font-size: 21px; color: var(--blue-deep); position: relative; background: var(--card);
}
.brand-mark::after { content: ''; position: absolute; inset: -5px; border: 1px solid var(--line); border-radius: 50%; }
.brand-text { font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft); }
.brand-text strong { color: var(--ink); font-weight: 600; }
.brand-meta { margin-left: auto; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); }

.screen { display: none; flex: 1; padding: 48px 0 60px; animation: fade 0.5s ease both; }
.screen.active { display: flex; flex-direction: column; }
@keyframes fade { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }

.eyebrow { font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--lavender-deep); font-weight: 600; margin-bottom: 24px; }
.q-title {
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 400;
  font-variation-settings: 'opsz' 144, 'SOFT' 60;
  font-size: clamp(32px, 4.6vw, 52px); line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 16px;
}
.q-title em { color: var(--blue-deep); }
.q-helper { color: var(--ink-soft); font-size: 15px; margin-bottom: 32px; max-width: 620px; }

.field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 22px; }
.field-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); }
.text-input, .text-area {
  width: 100%; padding: 16px 20px; background: var(--card); border: 1px solid var(--line);
  color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; font-size: 17px; outline: none; transition: border 0.2s ease;
  box-shadow: 0 2px 10px rgba(46,90,168,0.04);
}
.text-area { font-family: 'Fraunces', serif; font-style: italic; font-size: 20px; line-height: 1.4; min-height: 150px; resize: vertical; }
.text-input::placeholder, .text-area::placeholder { color: var(--ink-faint); }
.text-input:focus, .text-area:focus { border-color: var(--blue); }

.options { display: grid; gap: 12px; }
.opt {
  padding: 20px 26px; background: var(--card); border: 1px solid var(--line); border-radius: 12px;
  cursor: pointer; transition: all 0.25s ease; display: flex; align-items: center; position: relative; overflow: hidden;
  box-shadow: 0 2px 12px rgba(46,90,168,0.05);
}
.opt:hover { border-color: var(--blue); transform: translateX(4px); }
.opt-label { font-family: 'Fraunces', serif; font-style: italic; font-weight: 500; font-size: 21px; }
.opt.selected { border-color: var(--blue); background: var(--bg-soft); }
.opt.selected::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(74,125,214,0.1), rgba(184,166,232,0.06)); pointer-events: none; }
.opt.selected::after {
  content: '✓'; position: absolute; right: 20px; width: 26px; height: 26px; border-radius: 50%;
  background: var(--blue); color: #fff; display: grid; place-items: center; font-size: 14px; font-weight: 700;
}
.opt > * { position: relative; z-index: 1; }

.scale-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; }
.scale-cell {
  background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 22px 6px 16px;
  text-align: center; cursor: pointer; position: relative; overflow: hidden; transition: all 0.25s ease;
  display: flex; flex-direction: column; justify-content: center; min-height: 120px;
  box-shadow: 0 2px 12px rgba(46,90,168,0.05);
}
.scale-cell:hover { border-color: var(--blue); }
.scale-num { font-family: 'Fraunces', serif; font-style: italic; font-weight: 700; font-size: clamp(34px,6vw,46px); color: var(--blue-deep); margin-bottom: 6px; }
.scale-label { font-size: 9.5px; color: var(--ink-soft); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.3; }
.scale-cell.selected { border-color: var(--blue); background: var(--bg-soft); }
.scale-cell.selected::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(74,125,214,0.1), rgba(184,166,232,0.06)); pointer-events: none; }
.scale-cell > * { position: relative; z-index: 1; }

.start-btn {
  padding: 20px 38px; background: var(--blue); color: #fff; border: none; border-radius: 10px;
  font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase;
  font-weight: 500; cursor: pointer; transition: all 0.3s ease; align-self: flex-start;
  display: inline-flex; align-items: center; gap: 16px; margin-top: 8px; box-shadow: 0 4px 16px rgba(74,125,214,0.25);
}
.start-btn:hover { background: var(--blue-deep); letter-spacing: 0.26em; }
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.start-btn .arrow { font-family: 'Fraunces', serif; font-style: italic; font-size: 22px; }

.bottom-nav { position: sticky; bottom: 0; padding: 20px 0; display: flex; justify-content: space-between; align-items: center; gap: 16px;
  background: linear-gradient(to top, var(--bg) 70%, transparent); margin-top: 20px; }
.nav-btn { padding: 14px 26px; background: var(--card); color: var(--ink-soft); border: 1px solid var(--line); border-radius: 8px;
  font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease; font-weight: 500; }
.nav-btn:hover { color: var(--blue-deep); border-color: var(--blue); }
.nav-btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.nav-btn.primary:hover { background: var(--blue-deep); border-color: var(--blue-deep); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.live-counter { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.18em; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); animation: pulse 1.6s ease-in-out infinite; box-shadow: 0 0 12px var(--teal); }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(1.4);} }

.progress-rail { display: none; gap: 6px; padding: 22px 0 0; }
.progress-rail span { flex: 1; height: 3px; background: var(--line); transition: background 0.5s ease; }
.progress-rail span.done { background: var(--blue); }
.progress-rail span.active { background: var(--lavender-deep); }

.thanks-hero { text-align: center; margin: 50px auto 0; max-width: 600px; }
.thanks-mark { width: 92px; height: 92px; border-radius: 50%; border: 1px solid var(--blue); margin: 0 auto 36px;
  display: grid; place-items: center; font-family: 'Fraunces', serif; font-style: italic; font-size: 46px; color: var(--blue-deep); background: var(--card); position: relative; box-shadow: 0 6px 24px rgba(74,125,214,0.15); }
.thanks-mark::after { content: ''; position: absolute; inset: -8px; border: 1px solid var(--line); border-radius: 50%; }
.thanks-title { font-family: 'Fraunces', serif; font-style: italic; font-size: clamp(40px,6vw,68px); line-height: 0.95; margin-bottom: 22px; }
.thanks-title em { color: var(--blue-deep); }
.thanks-deck { color: var(--ink-soft); font-size: 17px; line-height: 1.6; margin-bottom: 26px; }
.thanks-status { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 28px; display: inline-flex; align-items: center; gap: 10px; padding: 13px 22px; border: 1px solid var(--line); border-radius: 100px; background: var(--card); }
.thanks-status.success { color: var(--teal); border-color: rgba(95,179,163,0.4); }
.thanks-status.warn { color: var(--gold); border-color: rgba(201,138,60,0.4); }
.thanks-status.error { color: var(--lavender-deep); border-color: rgba(139,111,212,0.4); }
.thanks-quote { font-family: 'Fraunces', serif; font-style: italic; color: var(--blue-deep); font-size: 18px; line-height: 1.5; max-width: 520px; margin: 0 auto; }
.dl-btn { margin-top: 20px; padding: 14px 28px; background: var(--card); color: var(--blue-deep); border: 1px solid var(--blue); border-radius: 10px;
  font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; transition: all 0.25s ease; font-weight: 500; font-family: 'IBM Plex Sans', sans-serif; }
.dl-btn:hover { background: var(--blue); color: #fff; }
@media (max-width: 640px) { .opt-label { font-size: 18px; } }
</style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="brand-mark">↻</div>
    <div class="brand-text">EDU 690 · <strong>Reflexión Sesión 3</strong></div>
    <div class="brand-meta">Proyecto TIHA</div>
  </header>
  <div class="progress-rail" id="rail"></div>

  <section id="setup" class="screen active">
    <div class="eyebrow">Clase asincrónica · Evidencia de participación</div>
    <h1 class="q-title">Cuéntame cómo te <em>fue</em> hoy.</h1>
    <p class="q-helper">Solo toma 2 minutos. Esta reflexión me confirma que viviste la sesión y me ayuda a apoyarte mejor. Tus respuestas llegan directo a mi correo.</p>
    <div class="field">
      <label class="field-label" for="name">Tu nombre</label>
      <input class="text-input" id="name" placeholder="Como te llamas" autocomplete="off">
    </div>
    <div class="field">
      <label class="field-label" for="email">Tu correo (opcional)</label>
      <input class="text-input" id="email" type="email" placeholder="Por si necesito escribirte" autocomplete="off">
    </div>
    <button class="start-btn" id="start">Empezar <span class="arrow">→</span></button>
  </section>

  <main id="screens"></main>
  <section id="review" class="screen"></section>
  <section id="thanks" class="screen"></section>
</div>

<script>
const FORMSPREE_ENDPOINT = '';
const PROF_EMAIL = 'mserrano@sagrado.edu';

const QUESTIONS = [
  { id:'q1', eyebrow:'Pregunta 1 / 4', title:'¿Completaste las <em>dos prácticas</em>?', helper:'Sé honesta/o — si no diste a una, no pasa nada, lo retomamos.', type:'single',
    options:[
      {id:'ambas',label:'Sí, hice las dos (simulador + Raindrop)'},
      {id:'simulador',label:'Solo el simulador con IA'},
      {id:'raindrop',label:'Solo la curaduría en Raindrop'},
      {id:'ninguna',label:'Vi el contenido, pero aún no practico'}
    ]},
  { id:'q2', eyebrow:'Pregunta 2 / 4', title:'¿Qué tan <em>clara</em> quedó la diferencia entre las realidades?', helper:'VR, AR, MR y metaverso — del 1 al 5.', type:'scale',
    options:[
      {id:'s1',label:'Confusa',num:'1'},{id:'s2',label:'Algo',num:'2'},{id:'s3',label:'Bien',num:'3'},{id:'s4',label:'Clara',num:'4'},{id:'s5',label:'Cristalina',num:'5'}
    ]},
  { id:'q3', eyebrow:'Pregunta 3 / 4', title:'¿Sobre qué tema creaste (o <em>crearías</em>) tu simulador?', helper:'Aunque no lo hayas hecho aún, dime qué tema de tu disciplina te emociona.', type:'longtext', placeholder:'Mi simulador es (o sería) sobre...' },
  { id:'q4', eyebrow:'Pregunta 4 / 4 · Opcional', title:'¿Algo que <em>quieras decirme</em>?', helper:'Una duda, una idea, lo que necesites que refuerce. Lo leo todo.', type:'longtext', placeholder:'Tu mensaje libre... (opcional)' }
];

const state = { idx:-1, name:'', email:'', answers:{} };
QUESTIONS.forEach(q => { state.answers[q.id] = (q.type==='longtext') ? '' : null; });
let lastPayload = null;

function getQ(id){ return QUESTIONS.find(q=>q.id===id); }
function getLabel(id,oid){ const q=getQ(id); const o=q.options?.find(o=>o.id===oid); return o?o.label:oid; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function rail(){ const r=document.getElementById('rail'); r.innerHTML=''; const inQ=state.idx>=0&&state.idx<QUESTIONS.length;
  if(!inQ){r.style.display='none';return;} r.style.display='flex';
  for(let i=0;i<QUESTIONS.length;i++){const s=document.createElement('span'); if(i<state.idx)s.classList.add('done'); if(i===state.idx)s.classList.add('active'); r.appendChild(s);} }

function build(){ const c=document.getElementById('screens'); c.innerHTML='';
  QUESTIONS.forEach(q=>{ const sec=document.createElement('section'); sec.className='screen'; sec.id=q.id;
    let h=`<div class="eyebrow">${q.eyebrow}</div><h2 class="q-title">${q.title}</h2><p class="q-helper">${q.helper}</p>`;
    if(q.type==='single'){ h+=`<div class="options" data-qid="${q.id}">${q.options.map(o=>`<div class="opt" data-oid="${o.id}"><div class="opt-label">${o.label}</div></div>`).join('')}</div>`; }
    else if(q.type==='scale'){ h+=`<div class="scale-row" data-qid="${q.id}">${q.options.map(o=>`<div class="scale-cell" data-oid="${o.id}"><div class="scale-num">${o.num}</div><div class="scale-label">${o.label}</div></div>`).join('')}</div>`; }
    else if(q.type==='longtext'){ h+=`<textarea class="text-area" id="lt-${q.id}" placeholder="${q.placeholder}"></textarea>`; }
    sec.innerHTML=h;
    const nav=document.createElement('div'); nav.className='bottom-nav';
    nav.innerHTML=`<button class="nav-btn" data-prev>← Atrás</button><div class="live-counter"><span class="live-dot"></span><span>${q.eyebrow.split('·')[0]}</span></div><button class="nav-btn primary" data-next>${state.idx===QUESTIONS.length-1?'Revisar →':'Siguiente →'}</button>`;
    sec.appendChild(nav); c.appendChild(sec);
  });
  c.querySelectorAll('.opt, .scale-cell').forEach(el=>{ el.addEventListener('click',()=>{ const qid=el.parentElement.dataset.qid; const oid=el.dataset.oid;
    state.answers[qid]=oid; el.parentElement.querySelectorAll('.opt,.scale-cell').forEach(s=>s.classList.remove('selected')); el.classList.add('selected'); }); });
  QUESTIONS.forEach(q=>{ if(q.type==='longtext'){ const t=document.getElementById('lt-'+q.id); t.addEventListener('input',e=>{state.answers[q.id]=e.target.value;}); } });
  c.querySelectorAll('[data-next]').forEach(b=>b.addEventListener('click',()=>{state.idx++;show();}));
  c.querySelectorAll('[data-prev]').forEach(b=>b.addEventListener('click',()=>{if(state.idx>0)state.idx--;show();}));
}

function refresh(qid){ const q=getQ(qid); const sc=document.getElementById(qid); if(!sc)return;
  sc.querySelectorAll('.opt,.scale-cell').forEach(el=>el.classList.remove('selected'));
  const a=state.answers[qid];
  if(q.type==='single'||q.type==='scale'){ if(a){const el=sc.querySelector(`[data-oid="${a}"]`); if(el)el.classList.add('selected');} }
  else if(q.type==='longtext'){ const t=document.getElementById('lt-'+qid); if(t)t.value=a||''; }
  const prev=sc.querySelector('[data-prev]'); if(prev)prev.disabled=(state.idx===0);
}

function show(){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const inQ=state.idx>=0&&state.idx<QUESTIONS.length;
  if(state.idx===-1){ document.getElementById('setup').classList.add('active'); }
  else if(inQ){ const q=QUESTIONS[state.idx]; document.getElementById(q.id).classList.add('active'); refresh(q.id);
    setTimeout(()=>{ if(q.type==='longtext')document.getElementById('lt-'+q.id)?.focus(); },100); }
  else if(state.idx===QUESTIONS.length){ renderReview(); document.getElementById('review').classList.add('active'); }
  else if(state.idx===QUESTIONS.length+1){ document.getElementById('thanks').classList.add('active'); }
  rail(); window.scrollTo({top:0,behavior:'smooth'});
}

function ansLabel(q){ const a=state.answers[q.id]; if(!a)return null; if(q.type==='longtext')return a; return getLabel(q.id,a); }

function renderReview(){ const r=document.getElementById('review');
  const required=['q1','q2','q3']; const ok=required.every(id=>!!state.answers[id]);
  const map={q1:'Prácticas completadas',q2:'Claridad de conceptos',q3:'Tema de tu simulador',q4:'Mensaje libre'};
  r.innerHTML=`<div class="eyebrow">Casi listo · Revisa y envía</div><h2 class="q-title">Tu reflexión, <em>${esc(state.name||'estudiante')}</em>.</h2>
    <div style="display:flex;flex-direction:column;gap:20px;margin:28px 0 36px">
    ${QUESTIONS.map((q,i)=>{const a=ansLabel(q);const opt=q.id==='q4';return `<div style="border-bottom:1px solid var(--line);padding-bottom:18px">
      <div style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px">${map[q.id]}${opt?' · opcional':''}</div>
      <div style="font-family:'Fraunces',serif;font-style:italic;font-size:21px;color:${a?'var(--ink)':'var(--ink-faint)'}">${a?esc(a):'— Sin respuesta —'}</div>
      <button class="nav-btn" style="margin-top:10px;padding:8px 16px;font-size:10px" data-edit="${i}">Editar</button></div>`;}).join('')}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="nav-btn primary" id="submit" ${ok?'':'disabled'}>${ok?'↗ Enviar a la profesora':'Completa las preguntas 1 a 3'}</button>
      <button class="nav-btn" id="rback">← Atrás</button></div>`;
  r.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{state.idx=+b.dataset.edit;show();});
  document.getElementById('rback').onclick=()=>{state.idx=QUESTIONS.length-1;show();};
  document.getElementById('submit').onclick=submit;
}

async function submit(){ const b=document.getElementById('submit'); b.disabled=true; b.textContent='Enviando...';
  const today=new Date().toLocaleString('es-PR',{dateStyle:'long',timeStyle:'short'});
  const payload={ _subject:`EDU 690 · Reflexión Sesión 3 · ${state.name}`, _replyto:state.email||'',
    estudiante:state.name, correo:state.email||'(no dado)', fecha:today, curso:'EDU 690', sesion:'Sesión 3 (asincrónica)',
    practicas_completadas: ansLabel(getQ('q1'))||'', claridad_conceptos: ansLabel(getQ('q2'))||'',
    tema_simulador: ansLabel(getQ('q3'))||'', mensaje_libre: ansLabel(getQ('q4'))||'(sin mensaje)' };
  lastPayload = payload;
  let status='local';
  if(FORMSPREE_ENDPOINT){ try{ const res=await fetch(FORMSPREE_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(payload)}); status=res.ok?'success':'error'; }catch(e){status='error';} }
  dl(`reflexion_sesion3_${(state.name||'estudiante').replace(/\s+/g,'_')}.json`,payload);
  state.idx=QUESTIONS.length+1; renderThanks(status); show();
}

function renderThanks(status){ const t=document.getElementById('thanks'); let box='',body='';
  if(status==='success'){ box='<div class="thanks-status success">● Enviado a la profesora</div>'; body='Tu reflexión llegó a mi correo. ¡Gracias por vivir esta sesión a tu ritmo!'; }
  else if(status==='error'){ box='<div class="thanks-status error">⚠ El envío automático falló</div>'; body='Se descargó una copia en tu dispositivo. Por favor envíala por Canvas o adjúntala en un correo a mserrano@sagrado.edu.'; }
  else { box='<div class="thanks-status warn">● Copia descargada</div>'; body='Se descargó un archivo con tu reflexión. Por favor súbelo a Canvas o adjúntalo en un correo a mserrano@sagrado.edu.'; }
  t.innerHTML=`<div class="thanks-hero"><div class="thanks-mark">✓</div>${box}
    <h1 class="thanks-title">Gracias, <em>${esc((state.name||'compañera').split(' ')[0])}</em>.</h1>
    <p class="thanks-deck">${body}</p>
    <button class="dl-btn" id="redownload">↓ Descargar mi reflexión de nuevo</button>
    <p class="thanks-quote" style="margin-top:32px">"No aprendimos herramientas. Aprendimos nuevas maneras de imaginar el aprendizaje."</p></div>`;
  document.getElementById('redownload').onclick=()=>{ if(lastPayload) dl(`reflexion_sesion3_${(state.name||'estudiante').replace(/\s+/g,'_')}.json`,lastPayload); };
}

function dl(fn,data){ try{ const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const u=URL.createObjectURL(b);
  const a=document.createElement('a'); a.href=u; a.download=fn; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); }catch(e){console.error(e);} }

document.getElementById('start').addEventListener('click',()=>{ const n=document.getElementById('name').value.trim();
  if(!n){ const el=document.getElementById('name'); el.focus(); el.style.borderColor='var(--blue)'; return; }
  state.name=n; state.email=document.getElementById('email').value.trim(); state.idx=0; show(); });

build(); show();
</script>
</body>
</html>
