<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Celular del Cuerpo Humano</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: var(--bg-color); 
            color: #333; 
        }
        header { 
            background-color: var(--primary-color); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .container { 
            display: flex; 
            flex-wrap: wrap; 
            max-width: 1000px; 
            margin: 30px auto; 
            gap: 20px; 
            padding: 0 20px; 
        }
        .panel { 
            background: white; 
            border-radius: 12px; 
            padding: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            flex: 1; 
            min-width: 300px; 
        }
        
        /* Mapa Anatómico CSS */
        .anatomy-map { 
            position: relative; 
            width: 180px; 
            height: 380px; 
            margin: 20px auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .head { 
            width: 70px; 
            height: 90px; 
            background: #e0e4e8; 
            border-radius: 50%; 
            margin-bottom: 5px; 
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.05);
        }
        .torso { 
            width: 130px; 
            height: 160px; 
            background: #e0e4e8; 
            border-radius: 40px; 
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.05);
        }
        .legs {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .leg {
            width: 40px;
            height: 100px;
            background: #e0e4e8;
            border-radius: 20px;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.05);
        }
        
        /* Botones de Órganos */
        .btn-organ { 
            position: absolute; 
            width: 25px; 
            height: 25px; 
            border-radius: 50%; 
            border: 3px solid white; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 3px 6px rgba(0,0,0,0.16);
        }
        .btn-organ:hover { 
            transform: scale(1.4); 
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }
        #btn-brain { top: 30px; left: 75px; background: #9b59b6; }
        #btn-heart { top: 130px; left: 95px; background: #e74c3c; }
        #btn-blood { top: 200px; left: 70px; background: #c0392b; }
        
        /* Visor Celular */
        canvas { 
            width: 100%; 
            height: 300px; 
            background: #1a1a2e; 
            border-radius: 8px; 
            margin-top: 15px; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        h3 { color: var(--primary-color); border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        .instruction { color: #7f8c8d; font-style: italic; font-size: 0.9em; }
    </style>
</head>
<body>

<header>
    <h1>Simulador de Biología Celular</h1>
    <p>Exploración de sistemas a nivel microscópico</p>
</header>

<div class="container">
    <div class="panel">
        <h3>1. Selecciona el Sistema</h3>
        <p class="instruction">Haz clic en los indicadores del modelo anatómico:</p>
        <div class="anatomy-map">
            <div class="head"></div>
            <div class="torso"></div>
            <div class="legs">
                <div class="leg"></div>
                <div class="leg"></div>
            </div>
            <!-- Puntos interactivos -->
            <button class="btn-organ" id="btn-brain" onclick="loadSimulation('brain')" title="Tejido Nervioso (Cerebro)"></button>
            <button class="btn-organ" id="btn-heart" onclick="loadSimulation('heart')" title="Tejido Muscular Cardíaco"></button>
            <button class="btn-organ" id="btn-blood" onclick="loadSimulation('blood')" title="Tejido Sanguíneo"></button>
        </div>
    </div>

    <div class="panel">
        <h3 id="cell-title">2. Visor Microscópico</h3>
        <p id="cell-desc" class="instruction">Esperando selección del usuario...</p>
        <canvas id="cellCanvas" width="400" height="300"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('cellCanvas');
    const ctx = canvas.getContext('2d');
    let animationId;
    let currentSystem = '';
    let cells = [];

    // Base de conocimientos
    const knowledgeBase = {
        brain: { 
            title: 'Neuronas (Tejido Nervioso)', 
            desc: 'Observa la transmisión de impulsos eléctricos (potencial de acción) a través de las sinapsis neuronales.',
        },
        heart: { 
            title: 'Cardiomiocitos (Tejido Muscular)', 
            desc: 'Células musculares estriadas que se contraen rítmica e involuntariamente impulsadas por señales eléctricas.',
        },
        blood: { 
            title: 'Eritrocitos (Tejido Sanguíneo)', 
            desc: 'Glóbulos rojos anucleados fluyendo a través del plasma para transportar oxígeno y dióxido de carbono.',
        }
    };

    // Inicializador de partículas según el tejido
    function initCells(type) {
        cells = [];
        const count = type === 'blood' ? 40 : (type === 'heart' ? 12 : 35);
        for (let i = 0; i < count; i++) {
            cells.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: type === 'blood' ? 6 : (type === 'heart' ? 20 : 3),
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5,
                phase: Math.random() * Math.PI * 2
            });
        }
    }

    // Animación de red neuronal
    function drawBrain() {
        ctx.fillStyle = 'rgba(26, 26, 46, 0.2)'; // Efecto de rastro
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        cells.forEach((cell, i) => {
            cell.x += cell.vx * 0.4; 
            cell.y += cell.vy * 0.4;
            
            // Rebote en bordes
            if(cell.x < 0 || cell.x > canvas.width) cell.vx *= -1;
            if(cell.y < 0 || cell.y > canvas.height) cell.vy *= -1;

            // Dibujar soma (cuerpo celular)
            ctx.beginPath();
            ctx.arc(cell.x, cell.y, cell.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#9b59b6';
            ctx.fill();

            // Dibujar dendritas/axones e impulsos
            for(let j = i + 1; j < cells.length; j++) {
                let target = cells[j];
                let dist = Math.hypot(cell.x - target.x, cell.y - target.y);
                
                if(dist < 65) {
                    ctx.beginPath();
                    ctx.moveTo(cell.x, cell.y);
                    ctx.lineTo(target.x, target.y);
                    
                    // Simular chispa sináptica aleatoria
                    if (Math.random() > 0.98) {
                        ctx.strokeStyle = '#f1c40f'; // Destello eléctrico
                        ctx.lineWidth = 2;
                    } else {
                        ctx.strokeStyle = 'rgba(155, 89, 182, 0.2)'; // Conexión base
                        ctx.lineWidth = 1;
                    }
                    ctx.stroke();
                }
            }
        });
    }

    // Animación de contracción cardíaca
    function drawHeart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Ritmo cardíaco global (Sístole/Diástole)
        let contraction = Math.sin(Date.now() / 150); 
        let isBeating = contraction > 0.8;

        cells.forEach(cell => {
            let currentRadius = isBeating ? cell.radius * 1.3 : cell.radius;
            
            ctx.beginPath();
            // Forma de miocito (ligeramente alargada)
            ctx.rect(cell.x - currentRadius, cell.y - currentRadius/2, currentRadius*2, currentRadius);
            
            ctx.fillStyle = isBeating ? '#ff4757' : '#e84118';
            ctx.fill();
            ctx.strokeStyle = '#c23616';
            ctx.lineWidth = 2;
            ctx.strokeRect(cell.x - currentRadius, cell.y - currentRadius/2, currentRadius*2, currentRadius);
            
            // Discos intercalares (estrías)
            ctx.beginPath();
            ctx.moveTo(cell.x, cell.y - currentRadius/2);
            ctx.lineTo(cell.x, cell.y + currentRadius/2);
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.stroke();
        });
    }

    // Animación de torrente sanguíneo
    function drawBlood() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        cells.forEach(cell => {
            // Flujo hemodinámico
            cell.x += 2; 
            cell.y += Math.sin(cell.x / 40 + cell.phase) * 0.8;
            
            // Reciclaje de células que salen de la pantalla
            if(cell.x > canvas.width + 15) {
                cell.x = -15;
                cell.y = Math.random() * canvas.height;
            }

            // Dibujar glóbulo rojo (disco bicóncavo)
            ctx.beginPath();
            ctx.arc(cell.x, cell.y, cell.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            
            // Centro más claro para simular concavidad
            ctx.beginPath();
            ctx.arc(cell.x, cell.y, cell.radius * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = '#ff7979';
            ctx.fill();
        });
    }

    // Motor de renderizado
    function animate() {
        if(currentSystem === 'brain') drawBrain();
        else if(currentSystem === 'heart') drawHeart();
        else if(currentSystem === 'blood') drawBlood();
        
        animationId = requestAnimationFrame(animate);
    }

    // Controlador principal interactivo
    function loadSimulation(system) {
        currentSystem = system;
        cancelAnimationFrame(animationId);
        
        // Actualizar interfaz
        document.getElementById('cell-title').innerText = knowledgeBase[system].title;
        document.getElementById('cell-desc').innerText = knowledgeBase[system].desc;
        
        // Reiniciar estado visual
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        initCells(system);
        animate();
    }
    
    // Dibujar fondo estático inicial
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillText("Sistema en espera...", 140, 150);
</script>

</body>
</html>
