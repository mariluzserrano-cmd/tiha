<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compromiso TIHA - IA con Propósito</title>
    <style>
        :root {
            --tiha-azul: #d8ecf4;
            --tiha-dorado: #f3df8c;
            --tiha-gris: #3f4a4f;
            --far-naranja: #d84a26;
            --far-marron: #5b514b;
            --crema: #fbf7ef;
        }

        body {
            margin: 0;
            padding: 20px;
            background: var(--crema);
            font-family: "Georgia", "Times New Roman", serif;
            color: var(--tiha-gris);
            display: flex;
            justify-content: center;
        }

        .document-container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            border: 8px solid var(--tiha-azul);
            padding: 40px;
            box-sizing: border-box;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .logos {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logos img {
            max-height: 80px;
            object-fit: contain;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin: 10px 0 5px;
            color: var(--far-marron);
            letter-spacing: 1px;
        }

        h2 {
            text-align: center;
            font-size: 18px;
            font-weight: normal;
            margin: 0 0 25px;
            color: var(--far-naranja);
        }

        .quote {
            text-align: center;
            font-style: italic;
            font-size: 16px;
            margin: 20px auto;
            padding: 12px 25px;
            border-top: 2px solid var(--tiha-dorado);
            border-bottom: 2px solid var(--tiha-dorado);
            max-width: 85%;
        }

        .section-title {
            font-size: 18px;
            color: var(--far-marron);
            border-left: 6px solid var(--far-naranja);
            padding-left: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            margin-top: 30px;
        }

        .principles-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .checkbox-label {
            display: flex;
            align-items: flex-start;
            background: #ffffff;
            border: 1px solid var(--tiha-azul);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
        }

        .checkbox-label:hover {
            background: var(--crema);
        }

        .checkbox-label input {
            margin-top: 3px;
            margin-right: 10px;
            accent-color: var(--far-naranja);
            width: 18px;
            height: 18px;
        }

        .levels {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 15px;
            text-align: center;
        }

        .level {
            padding: 15px 5px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .level-0 { background: var(--tiha-azul); }
        .level-1 { background: #e8f3d8; }
        .level-2 { background: var(--tiha-dorado); }
        .level-3 { background: #f2c9b9; }
        .level-4 { background: #e7d7ef; }

        .commitment-box {
            background: #ffffff;
            border: 2px dashed var(--far-naranja);
            border-radius: 12px;
            padding: 25px;
            margin-top: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--tiha-gris);
        }

        textarea {
            width: 100%;
            height: 60px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            background-color: #fafafa;
        }

        textarea:focus {
            outline: none;
            border-color: var(--far-naranja);
            background-color: #fff;
        }

        .statement {
            background: var(--tiha-azul);
            padding: 18px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.5;
            margin-top: 30px;
            text-align: center;
        }

        .signature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 30px;
        }

        .input-line {
            width: 100%;
            border: none;
            border-bottom: 2px solid var(--far-marron);
            padding: 8px 0;
            font-size: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
            color: var(--tiha-gris);
        }

        .input-line:focus {
            outline: none;
            border-bottom-color: var(--far-naranja);
        }

        .input-label {
            font-size: 12px;
            color: var(--far-marron);
            margin-top: 4px;
            display: block;
        }

        .actions {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-submit {
            background-color: var(--far-naranja);
            color: white;
        }

        .btn-print {
            background-color: var(--tiha-gris);
            color: white;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }
            .document-container {
                border: 6px solid var(--tiha-azul);
                box-shadow: none;
                max-width: 100%;
                padding: 30px;
            }
            .actions {
                display: none;
            }
            textarea {
                border: none;
                border-bottom: 1px solid #ccc;
                background: transparent;
                resize: none;
            }
        }
    </style>
</head>
