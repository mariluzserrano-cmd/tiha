<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia | Career Bot 24/7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #E3263A 0%, #b91f29 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #E3263A;
            padding-bottom: 20px;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #E3263A;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            margin: 0 auto 15px;
            font-weight: bold;
        }

        h1 {
            color: #E3263A;
            font-size: 26px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .event-info {
            color: #E3263A;
            font-size: 13px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 15px;
        }

        input[type="text"],
        input[type="number"],
        input[type="email"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="email"]:focus,
        select:focus {
            outline: none;
            border-color: #E3263A;
            box-shadow: 0 0 0 3px rgba(227, 38, 58, 0.1);
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E3263A' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 40px;
        }

        button {
            width: 100%;
            padding: 14px 20px;
            background: #E3263A;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #c91f2e;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(227, 38, 58, 0.2);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #c3e6cb;
            animation: fadeIn 0.5s ease;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #f5c6cb;
            animation: fadeIn 0.5s ease;
        }

        .error-message.show {
            display: block;
        }

        .required {
            color: #E3263A;
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 22px;
            }

            label {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📋</div>
            <h1>Registro de Asistencia</h1>
            <p class="subtitle">The 24/7 Career Bot</p>
            <p class="event-info">IA para Internships, Marca Personal y Éxito Académico</p>
        </div>

        <div id="successMessage" class="success-message">
            ✅ ¡Gracias! Tu asistencia fue registrada con éxito.
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="registroForm">
            <!-- Nombre Completo -->
            <div class="form-group">
                <label for="nombre">Nombre Completo <span class="required">*</span></label>
                <input type="text" id="nombre" name="Nombre_Completo" 
                    placeholder="Ej: Juan Pedro García" 
                    required>
            </div>

            <!-- Número Estudiantil -->
            <div class="form-group">
                <label for="numeroEstudiantil"># Estudiantil <span class="required">*</span></label>
                <input type="text" id="numeroEstudiantil" name="Numero_Estudiantil" 
                    placeholder="Ej: A00123456" 
                    required>
            </div>

            <!-- Asociación/Facultad -->
            <div class="form-group">
                <label for="asociacion">Asociación / Facultad <span class="required">*</span></label>
                <select id="asociacion" name="Asociacion" required>
                    <option value="">-- Selecciona tu asociación --</option>
                    <option value="Administración de Empresas">Administración de Empresas</option>
                    <option value="Escuela Graduada de Planificación">Escuela Graduada de Planificación (EGP)</option>
                    <option value="Arquitectura">Arquitectura</option>
                    <option value="Ingeniería">Ingeniería</option>
                    <option value="Ciencias Naturales">Ciencias Naturales</option>
                    <option value="Humanidades">Humanidades</option>
                    <option value="Educación">Educación</option>
                    <option value="Derecho">Derecho</option>
                    <option value="Estudios Generales">Estudios Generales</option>
                    <option value="Otra">Otra</option>
                </select>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Tu Email <span class="required">*</span></label>
                <input type="email" id="email" name="Email" 
                    placeholder="tu.email@upr.edu" 
                    required>
            </div>

            <!-- Botón Submit -->
            <button type="submit" id="submitBtn">
                Registrar Asistencia
            </button>
        </form>

        <div class="footer-note">
            ℹ️ Esta información será enviada a los coordinadores del evento
        </div>
    </div>

    <script>
        const form = document.getElementById('registroForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMsg = document.getElementById('successMessage');
        const errorMsg = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value.trim();
            const numeroEstudiantil = document.getElementById('numeroEstudiantil').value.trim();
            const asociacion = document.getElementById('asociacion').value.trim();
            const email = document.getElementById('email').value.trim();

            // Validaciones
            if (!nombre || !numeroEstudiantil || !asociacion || !email) {
                showError('Por favor, completa todos los campos');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Registrando...';
            errorMsg.classList.remove('show');

            try {
                // Array de emails donde enviar el registro
                const destinatarios = [
                    'lisbeth.tavarez@upr.edu',
                    'larimar.claudio@upr.edu',
                    'natali.reillo@upr.edu'
                ];

                // Enviar a cada coordinador
                for (let email_coordinador of destinatarios) {
                    const formData = new FormData();
                    formData.append('email', email_coordinador);
                    formData.append('Nombre_Completo', nombre);
                    formData.append('Numero_Estudiantil', numeroEstudiantil);
                    formData.append('Asociacion', asociacion);
                    formData.append('Email_Estudiante', email);
                    formData.append('Fecha_Hora', new Date().toLocaleString('es-PR'));
                    formData.append('_captcha', 'false');
                    formData.append('_next', window.location.href);

                    const response = await fetch('https://formsubmit.co/' + email_coordinador, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error('Error al enviar');
                    }
                }

                // Éxito
                successMsg.classList.add('show');
                form.reset();
                submitBtn.disabled = false;
                submitBtn.textContent = 'Registrar Asistencia';

                // Limpiar mensaje de éxito después de 5 segundos
                setTimeout(() => {
                    successMsg.classList.remove('show');
                }, 5000);

            } catch (error) {
                console.error('Error:', error);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Registrar Asistencia';
                showError('Hubo un error al registrar. Intenta de nuevo o contacta a los coordinadores.');
            }
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
