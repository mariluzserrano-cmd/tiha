<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recap del Taller: IA en Procesos Educativos</title>
    <style>
        @page {
            size: letter;
            margin: 10mm;
            background-color: #fbf7ef;
        }
        
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #3f4a4f;
            background-color: #fbf7ef;
            font-size: 9pt;
            line-height: 1.3;
        }

        /* Contenedor que simula una página física */
        .page-container {
            background-color: #ffffff;
            border: 6px solid #d8ecf4;
            padding: 20px 25px;
            height: 10.1in;
            position: relative;
            margin: 0 auto 20px auto;
            max-width: 8.5in;
            page-break-after: always;
        }

        @media print {
            body {
                background-color: #ffffff;
            }
            .page-container {
                margin: 0;
                height: 10.2in;
                max-width: 100%;
                border: 6px solid #d8ecf4;
            }
        }

        /* Header block */
        .header-table {
            width: 100%;
            display: table;
            margin-bottom: 15px;
        }
        .header-cell {
            display: table-cell;
            vertical-align: middle;
        }
        .header-left { width: 25%; text-align: left; }
        .header-center { width: 50%; text-align: center; }
        .header-right { width: 25%; text-align: right; }

        .logo-tiha { max-height: 55px; object-fit: contain; }
        .logo-far { max-height: 55px; object-fit: contain; }

        h1 {
            font-family: "Georgia", "Times New Roman", serif;
            font-size: 18pt;
            color: #5b514b;
            margin: 0 0 5px 0;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .subtitle {
            font-size: 10.5pt;
            color: #d84a26;
            margin: 0 0 8px 0;
            font-weight: normal;
        }
        .meta-text {
            font-size: 9pt;
            color: #5b514b;
            line-height: 1.4;
        }

        /* Central Quote */
        .quote-box {
            text-align: center;
            font-family: "Georgia", "Times New Roman", serif;
            font-style: italic;
            font-size: 11pt;
            margin: 15px auto;
            padding: 8px 0;
            border-top: 1.5px solid #f3df8c;
            border-bottom: 1.5px solid #f3df8c;
            width: 90%;
            color: #3f4a4f;
        }

        /* Main 2-Column Layout via Table */
        .main-layout {
            width: 100%;
            display: table;
            table-layout: fixed;
            margin-top: 15px;
            border-collapse: collapse;
        }
        .column {
            display: table-cell;
            vertical-align: top;
            width: 50%;
        }
        .col-left { padding-right: 15px; }
        .col-right { padding-left: 15px; }

        /* Section Styling */
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-family: "Georgia", "Times New Roman", serif;
            font-size: 12pt;
            color: #5b514b;
            border-left: 5px solid #d84a26;
            padding-left: 10px;
            margin-bottom: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Section 1: Diagnóstico List */
        .diag-list {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .diag-item {
            margin-bottom: 6px;
            padding-left: 16px;
            position: relative;
            font-size: 9.5pt;
        }
        .diag-item::before {
            content: "•";
            color: #d84a26;
            position: absolute;
            left: 2px;
            font-weight: bold;
            font-size: 12pt;
            line-height: 1;
        }

        /* Section 2: Conceptos Clave */
        .concept-card {
            background: #fafafa;
            border: 1px solid #d8ecf4;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 8px;
            width: 100%;
        }
        .concept-title {
            font-weight: bold;
            color: #d84a26;
            font-size: 9.5pt;
            margin-bottom: 3px;
        }
        .concept-desc {
            font-size: 9pt;
            color: #3f4a4f;
            margin: 0;
        }

        /* Section 3: Herramientas Grid */
        .tools-container {
            width: 100%;
        }
        .tool-tag {
            display: inline-block;
            width: 48%;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-left: 3px solid #3f4a4f;
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 4px;
            vertical-align: top;
            font-size: 9pt;
        }
        .tool-tag:nth-child(odd) {
            margin-right: 3%;
        }
        .tool-name {
            font-weight: bold;
            color: #5b514b;
        }

        /* Section 4: Los 5 niveles de uso */
        .levels-stack {
            margin-top: 8px;
        }
        .level-row {
            padding: 6px 12px;
            margin-bottom: 4px;
            border-radius: 4px;
            font-size: 9pt;
            font-weight: bold;
        }
        .lvl-0 { background: #d8ecf4; color: #3f4a4f; }
        .lvl-1 { background: #e8f3d8; color: #3f4a4f; }
        .lvl-2 { background: #f3df8c; color: #5b514b; }
        .lvl-3 { background: #f2c9b9; color: #5b514b; }
        .lvl-4 { background: #e7d7ef; color: #3f4a4f; }
        
        .level-note {
            font-style: italic;
            font-size: 8.5pt;
            color: #5b514b;
            margin-top: 6px;
        }

        /* Section 5: Idea Fuerza Box */
        .idea-box {
            background: #ffffff;
            border: 2px dashed #d84a26;
            border-radius: 8px;
            padding: 12px 15px;
            margin-top: 10px;
        }
        .idea-text {
            font-size: 9.5pt;
            margin-bottom: 6px;
            position: relative;
            padding-left: 15px;
        }
        .idea-text::before {
            content: "→";
            color: #d84a26;
            position: absolute;
            left: 0;
            font-weight: bold;
        }
        .idea-text:last-child {
            margin-bottom: 0;
        }

        /* Section 6: Próximos pasos (Pagina 2) */
        .step-item {
            margin-bottom: 15px;
            font-size: 12pt;
            display: table;
        }
        .step-checkbox {
            display: table-cell;
            font-family: monospace;
            color: #d84a26;
            font-weight: bold;
            font-size: 16pt;
            padding-right: 12px;
            vertical-align: top;
        }
        .step-text {
            display: table-cell;
            vertical-align: middle;
            color: #3f4a4f;
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 20px;
            left: 25px;
            right: 25px;
            text-align: center;
            font-size: 8pt;
            color: #5b514b;
            border-top: 1.5px solid #f3df8c;
            padding-top: 8px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- PÁGINA 1 -->
    <div class="page-container">
        
        <!-- Header Section -->
        <div class="header-table">
            <div class="header-cell header-left">
                <img
